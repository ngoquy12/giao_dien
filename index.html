<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Reset cơ bản */
      * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 20px;
        background-color: #f4f4f4;
      }
      .container {
        display: flex;
        gap: 20px;
        max-width: 1200px;
        margin: auto;
      }

      /* Khu vực Form bên trái */
      .form-container {
        flex: 1;
        background: white;
        padding: 20px;
        border: 1px solid #ccc;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
      }
      button {
        cursor: pointer;
        padding: 10px 15px;
        background: #333;
        color: white;
        border: none;
      }
      button:hover {
        background: #555;
      }

      /* Khu vực Bảng bên phải */
      .list-container {
        flex: 2;
        background: white;
        padding: 20px;
        border: 1px solid #ccc;
      }
      .filter-group {
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      table,
      th,
      td {
        border: 1px solid #ddd;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
      }
      th {
        background-color: #eee;
      }

      /* Trạng thái đặc biệt */
      .priority-high {
        color: red;
        font-weight: bold;
      }
      .even-row {
        background-color: #fafafa;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="form-container">
        <h3>Thông tin Sinh viên</h3>
        <div class="form-group">
          <label>Mã SV:</label>
          <input type="text" id="studentId" />
        </div>
        <div class="form-group">
          <label>Họ tên:</label>
          <input type="text" id="studentName" />
        </div>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" id="studentEmail" />
        </div>
        <button id="btnAdd">Thêm mới</button>
      </div>

      <div class="list-container">
        <h3>Danh sách Sinh viên</h3>
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Mã SV</th>
              <th>Họ tên</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="listStudent"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
